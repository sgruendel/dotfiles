%YAML 1.3
---
- Key: [Dictation, pressed]
- Execute: [voxtype, record, start]
...
---
- Key: [Dictation, released]
- Execute: [voxtype, record, stop]
...
---
- Key: [Emoji, pressed]
- Execute: [walker, -m, symbols]
...
---
- Key: [Screen Capture, pressed]
- Execute: omarchy-capture-screenshot
...
---
- Key: [Mute Microphone, pressed]
- Execute: omarchy-audio-input-mute
...
---
- Key: [MultiPlatform Search, pressed]
- Execute: [walker, -m, files]
...
---
- Key: [Mute Sound, pressed]
- Execute: [omarchy-swayosd-client, --output-volume, mute-toggle]
...
---
- Key: [Volume Down, pressed]
- Execute: [omarchy-swayosd-client, --output-volume, lower]
...
---
- Key: [Volume Up, pressed]
- Execute: [omarchy-swayosd-client, --output-volume, raise]
...
---
- Key: [Backlight Down, pressed]
- Execute: [omarchy-brightness-keyboard, down]
...
---
- Key: [Backlight Up, pressed]
- Execute: [omarchy-brightness-keyboard, up]
...
---
- Key: [Calculator, pressed]
- Execute: [walker, -m, calc]
...
---
- Key: [Screen Capture/Print Screen, pressed]
- Execute: omarchy-capture-screenshot
...
---
- Key: [App Contextual Menu/Right Click, pressed]
- Execute: walker
...
---
- Key: [Screen Lock, pressed]
- Execute: omarchy-system-lock
...
